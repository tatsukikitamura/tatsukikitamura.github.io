    <script>
      // Decode SPA-redirect query produced by 404.html so React Router sees the
      // original deep-link path. Must run before the bundle loads.
      (function () {
        var l = window.location;
        if (l.search.startsWith('?/')) {
          var decoded = l.search
            .slice(2)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&');
            });
          var path = '/' + decoded[0];
          var query = decoded.slice(1).join('&');
          window.history.replaceState(null, '', path + (query ? '?' + query : '') + l.hash);
        }
      })();
    </script>
